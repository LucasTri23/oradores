<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Oradores — Bom Jesus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surf:#111118;--surf2:#18181f;--surf3:#1e1e28;--border:#2a2a38;--border2:#38384a;--pur:#7c3aed;--pur2:#9d5fff;--pur3:#c4b5fd;--pur-dim:rgba(124,58,237,.15);--pur-dim2:rgba(124,58,237,.06);--whi:#f8f8ff;--whi2:#c8c8d8;--whi3:#7878a0;--red:#ef4444;--green:#22c55e;--blue:#3b82f6;--amber:#f59e0b;--r:10px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--whi);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
#setup{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.setup-box{background:var(--surf);border:1px solid var(--border2);border-radius:16px;padding:32px;width:100%;max-width:460px;animation:up .3s}
.setup-logo{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--pur3);text-align:center;margin-bottom:2px}
.setup-sub{text-align:center;color:var(--whi3);font-size:12px;margin-bottom:22px}
.setup-step{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--pur3);margin-bottom:5px;margin-top:16px}
.setup-hint{font-size:12px;color:var(--whi3);line-height:1.6;margin-bottom:10px}
.setup-hint a{color:var(--pur3)}
#setupErr{color:var(--red);font-size:12px;margin-top:8px;display:none}
header{border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;background:rgba(10,10,15,.96);backdrop-filter:blur(12px);z-index:100;gap:10px}
.logo{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;color:var(--whi);letter-spacing:-.02em}
.logo span{color:var(--pur3)}
.ai-btn{display:flex;align-items:center;gap:5px;background:var(--pur-dim);border:1px solid rgba(124,58,237,.3);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--pur3);cursor:pointer;transition:.2s;white-space:nowrap;font-weight:600}
.ai-btn:hover{background:rgba(124,58,237,.25)}
nav{display:flex;padding:0 18px;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--surf);scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.tab{padding:12px 13px;color:var(--whi3);cursor:pointer;white-space:nowrap;font-size:11px;font-weight:600;border-bottom:2px solid transparent;transition:.18s;letter-spacing:.04em;text-transform:uppercase;user-select:none}
.tab:hover{color:var(--whi2)}.tab.active{color:var(--pur3);border-bottom-color:var(--pur)}
main{max-width:900px;margin:0 auto;padding:20px 18px}
.page{display:none}.page.active{display:block;animation:fadeIn .18s}
.panel-title{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;color:var(--whi);margin-bottom:14px;letter-spacing:-.02em}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px}
.slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--whi3);margin-bottom:6px}
.field{margin-bottom:12px}
label{display:block;font-size:11px;color:var(--whi3);margin-bottom:4px;font-weight:500}
input,select,textarea{width:100%;background:var(--surf2);border:1px solid var(--border2);border-radius:7px;color:var(--whi);font-family:'Inter',sans-serif;font-size:13px;padding:9px 11px;outline:none;transition:border-color .18s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--pur)}
input::placeholder,textarea::placeholder{color:var(--whi3)}
select option{background:var(--surf2)}
textarea{resize:vertical;min-height:64px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border:none;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:.02em;transition:.15s;white-space:nowrap}
.bp{background:var(--pur);color:#fff}.bp:hover{background:var(--pur2)}
.bo{background:transparent;border:1px solid var(--border2);color:var(--whi2)}.bo:hover{border-color:var(--pur);color:var(--pur3)}
.br{background:var(--red);color:#fff}.bgn{background:var(--green);color:#000}
.bw{background:var(--surf3);border:1px solid var(--border2);color:var(--whi2)}.bw:hover{border-color:var(--pur)}
.bs{padding:5px 10px;font-size:11px}
.brow{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.brow-r{display:flex;gap:6px;flex-wrap:wrap}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.g2{grid-template-columns:1fr}}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.04em}
.bpur{background:var(--pur-dim);color:var(--pur3);border:1px solid rgba(124,58,237,.25)}
.bgrn{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.bred{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.bamb{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
.bblu{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.bgry{background:rgba(255,255,255,.05);color:var(--whi3);border:1px solid var(--border)}
.week-card{background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(124,58,237,.04));border:1px solid rgba(124,58,237,.35);border-radius:14px;padding:20px;position:relative;margin-bottom:16px}
.week-date{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--pur3);margin-bottom:6px}
.week-tema{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;line-height:1.3;color:var(--whi);margin-bottom:12px;letter-spacing:-.02em}
.sentchip{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.22);border-radius:8px;padding:10px 14px;font-size:12px;color:#93c5fd;margin-bottom:16px}
.prog-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:8px;margin-bottom:5px;background:var(--surf);border:1px solid var(--border);transition:.15s}
.prog-row:hover{border-color:var(--border2)}
.or-item{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:11px 13px;border:1px solid var(--border);border-radius:8px;margin-bottom:5px;background:var(--surf);transition:.15s}
.or-item:hover{border-color:var(--border2)}
.tema-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:4px;background:var(--surf);transition:.15s;cursor:pointer}
.tema-row:hover{border-color:var(--pur);background:var(--pur-dim2)}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.fchip{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);color:var(--whi3);background:var(--surf2);transition:.15s}
.fchip.on{background:var(--pur-dim);border-color:var(--pur);color:var(--pur3)}
.sug-item{border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:6px;background:var(--surf)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.stat-box{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:13px 14px}
.stat-val{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;color:var(--pur3);line-height:1}
.stat-lbl{font-size:11px;color:var(--whi3);margin-top:3px}
.rank-row{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.rank-row:last-child{border:none}
.rank-bar{height:3px;background:var(--pur);border-radius:2px;margin-top:3px;opacity:.6}
.cong-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;background:var(--surf2);border:1px solid var(--border2);cursor:pointer;color:var(--whi2);transition:.15s;margin:2px}
.cong-chip:hover{border-color:var(--pur);color:var(--pur3)}
#aiPanel{position:fixed;right:0;top:0;bottom:0;width:320px;background:var(--surf);border-left:1px solid var(--border2);z-index:300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 24px rgba(0,0,0,.5)}
#aiPanel.open{transform:translateX(0)}
.ai-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ai-title{font-family:'Space Grotesk',sans-serif;color:var(--pur3);font-size:14px;font-weight:700}
.ai-chips{display:flex;flex-wrap:wrap;gap:5px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.chip{background:var(--surf2);border:1px solid var(--border2);border-radius:14px;padding:4px 10px;font-size:11px;cursor:pointer;color:var(--whi3);transition:.15s}
.chip:hover{border-color:var(--pur);color:var(--pur3)}
.ai-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.ai-msg{padding:9px 12px;border-radius:8px;font-size:12.5px;line-height:1.6;max-width:94%;word-break:break-word}
.ai-msg.u{background:var(--pur-dim);align-self:flex-end;color:var(--whi)}
.ai-msg.b{background:var(--surf2);align-self:flex-start;color:var(--whi2);border:1px solid var(--border)}
.ai-foot{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0}
.ai-foot input{flex:1}
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:500;align-items:center;justify-content:center;padding:14px}
.mbg.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--border2);border-radius:12px;padding:20px;width:100%;max-width:480px;animation:up .2s;max-height:92vh;overflow-y:auto}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--whi);margin-bottom:14px;letter-spacing:-.02em}
.imp-bar-wrap{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:10px 0}
.imp-bar{height:100%;background:var(--pur);width:0;transition:width .25s;border-radius:3px}
.imp-log{background:var(--surf2);border:1px solid var(--border);border-radius:7px;padding:8px;height:100px;overflow-y:auto;font-size:11px;color:var(--whi3);font-family:monospace;line-height:1.5}
#toast{position:fixed;bottom:18px;right:18px;background:var(--surf2);border:1px solid var(--pur);border-radius:8px;padding:9px 14px;font-size:12px;z-index:999;transform:translateY(60px);opacity:0;transition:.25s;max-width:240px;color:var(--whi)}
#toast.show{transform:translateY(0);opacity:1}
.spin{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--pur);border-radius:50%;animation:spin .7s linear infinite;margin:24px auto}
.empty{text-align:center;padding:28px 18px;color:var(--whi3)}
.empty .ico{font-size:30px;margin-bottom:6px}
hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.stars-el{display:flex;gap:2px}
.star{font-size:20px;cursor:pointer;color:var(--border2);transition:.1s;user-select:none}
.star.on{color:var(--amber)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<script src="data.js"><\/script>
<div id="setup">
  <div class="setup-box">
    <div class="setup-logo">◈ Bom Jesus Oradores</div>
    <div class="setup-sub">Configure o acesso antes de entrar</div>
    <div class="setup-step">1 — Firebase</div>
    <div class="setup-hint">Acesse <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> → projeto → ⚙️ Configurações → Seus apps → Web → SDK setup.</div>
    <div class="g2">
      <div class="field"><label>API Key</label><input id="sApiKey" placeholder="AIzaSy..."></div>
      <div class="field"><label>Project ID</label><input id="sProjId" placeholder="meu-projeto-id"></div>
    </div>
    <div class="g2">
      <div class="field"><label>Auth Domain</label><input id="sAuth" placeholder="projeto.firebaseapp.com"></div>
      <div class="field"><label>App ID</label><input id="sAppId" placeholder="1:123:web:abc..."></div>
    </div>
    <hr>
    <div class="setup-step">2 — Gemini AI <span style="font-size:10px;color:var(--whi3);font-weight:400">(opcional)</span></div>
    <div class="setup-hint">Chave gratuita em <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></div>
    <div class="field"><label>Gemini API Key</label><input id="sGemini" placeholder="AIzaSy..."></div>
    <div id="setupErr"></div>
    <button class="btn bp" style="width:100%;justify-content:center;margin-top:6px;padding:11px;font-size:13px" onclick="doSetup()">Entrar no sistema →</button>
  </div>
</div>
<div id="toast"></div>
<div id="aiPanel">
  <div class="ai-head"><div class="ai-title">◈ Assistente Gemini</div><button class="btn bo bs" onclick="closeAI()">✕</button></div>
  <div class="ai-chips">
    <div class="chip" onclick="askAI('Quem está há mais tempo sem discursar?')">⏰ Sem discursar</div>
    <div class="chip" onclick="askAI('Quais os 10 temas mais usados?')">📊 Top temas</div>
    <div class="chip" onclick="askAI('Quais temas nunca foram usados?')">🆕 Nunca usados</div>
    <div class="chip" onclick="askAI('Análise geral do histórico de oradores')">📋 Análise</div>
  </div>
  <div class="ai-msgs" id="aiMsgs"><div class="ai-msg b">Olá! Tenho acesso ao histórico completo da Congregação Bom Jesus. O que você quer saber?</div></div>
  <div class="ai-foot"><input id="aiIn" placeholder="Pergunte algo..." onkeydown="if(event.key==='Enter')sendAI()"><button class="btn bp bs" onclick="sendAI()">↑</button></div>
</div>
<!-- MODAL AGENDAMENTO -->
<div class="mbg" id="mAgend">
  <div class="modal">
    <div class="modal-title" id="mAgendTit">Inserir na Programação</div>
    <input type="hidden" id="agId">
    <div class="g2">
      <div class="field"><label>Data (sábado)</label><input type="date" id="agData"></div>
      <div class="field"><label>Nº do Tema</label><input type="number" id="agTema" min="1" max="194" placeholder="Ex: 45" oninput="onAgTema()"></div>
    </div>
    <div id="agTemaDesc" style="font-size:11px;color:var(--pur3);margin:-6px 0 10px;min-height:13px"></div>
    <div class="field"><label>Orador (cadastrado)</label>
      <select id="agOradorSel" onchange="onAgOradorSel()">
        <option value="">— Selecionar —</option>
        <option value="__digitar__">✏️ Digitar manualmente</option>
      </select>
    </div>
    <div id="agManual" style="display:none">
      <div class="g2">
        <div class="field"><label>Nome</label><input id="agNome" placeholder="Nome completo"></div>
        <div class="field"><label>Congregação</label><input id="agCong" placeholder="Congregação"></div>
      </div>
      <div class="field"><label>WhatsApp</label><input id="agTel" type="tel" placeholder="31 9xxxx-xxxx"></div>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:var(--whi2);margin-bottom:10px"><input type="checkbox" id="agCadastrar" style="width:auto"> Cadastrar como novo orador</label>
    </div>
    <div class="field"><label>Observação</label><input id="agObs" placeholder="Ex: Discurso especial..."></div>
    <div class="brow"><button class="btn bp" onclick="saveAgend()">Salvar</button><button class="btn bo" onclick="closeM('mAgend')">Cancelar</button></div>
  </div>
</div>
<!-- MODAL ORADOR -->
<div class="mbg" id="mOrador">
  <div class="modal">
    <div class="modal-title" id="mOradorTit">Novo Orador</div>
    <input type="hidden" id="oId">
    <div class="g2">
      <div class="field"><label>Nome</label><input id="oNome" placeholder="Nome completo"></div>
      <div class="field"><label>Congregação</label><input id="oCong" placeholder="Congregação"></div>
    </div>
    <div class="g2">
      <div class="field"><label>WhatsApp</label><input id="oTel" type="tel" placeholder="31 9xxxx-xxxx"></div>
      <div class="field"><label>Último discurso</label><input id="oUlt" type="date"></div>
    </div>
    <div class="field"><label>Nota</label><div class="stars-el" id="starsEl"><span class="star" data-v="1">★</span><span class="star" data-v="2">★</span><span class="star" data-v="3">★</span><span class="star" data-v="4">★</span><span class="star" data-v="5">★</span></div></div>
    <div class="field"><label>Observação</label><textarea id="oObs" placeholder="Anotações..."></textarea></div>
    <div class="brow"><button class="btn bp" onclick="saveOrador()">Salvar</button><button class="btn bo" onclick="closeM('mOrador')">Cancelar</button></div>
  </div>
</div>
<!-- MODAL SUGESTÃO -->
<div class="mbg" id="mSug">
  <div class="modal">
    <div class="modal-title">Nova Sugestão</div>
    <div class="field"><label>Quem sugeriu</label><input id="sNome" placeholder="Nome do ancião"></div>
    <div class="field"><label>Nº do Tema</label><input id="sNum" type="number" min="1" max="194" oninput="onSugNum()"></div>
    <div id="sNumName" style="font-size:11px;color:var(--pur3);margin:-6px 0 10px;min-height:13px"></div>
    <div class="field"><label>Observação</label><textarea id="sDesc" placeholder="Motivo..."></textarea></div>
    <div class="brow"><button class="btn bp" onclick="saveSug()">Salvar</button><button class="btn bo" onclick="closeM('mSug')">Cancelar</button></div>
  </div>
</div>
<!-- MODAL CONGREGAÇÃO -->
<div class="mbg" id="mCong">
  <div class="modal">
    <div class="modal-title" id="mCongTit">Congregação</div>
    <div id="mCongLista"></div>
    <div class="brow"><button class="btn bo" onclick="closeM('mCong')">Fechar</button></div>
  </div>
</div>
<!-- MODAL IMPORT EMBUTIDO -->
<div class="mbg" id="mImport">
  <div class="modal">
    <div class="modal-title">📥 Importar Dados da Planilha</div>
    <p style="font-size:12px;color:var(--whi2);margin-bottom:12px;line-height:1.6">Importa <strong>241 discursos</strong>, <strong>177 oradores</strong>, <strong>27 sugestões</strong> e <strong>156 semanas</strong> de programação para o Firebase.</p>
    <div class="imp-bar-wrap"><div class="imp-bar" id="impBar"></div></div>
    <div class="imp-log" id="impLog">Aguardando...</div>
    <div class="brow" id="impBtns"><button class="btn bp" onclick="startImport()">▶ Importar</button><button class="btn bo" onclick="closeM('mImport')">Cancelar</button></div>
  </div>
</div>
<!-- MODAL IMPORT XLSX -->
<div class="mbg" id="mImportXlsx">
  <div class="modal">
    <div class="modal-title">📂 Importar Planilha Excel</div>
    <div class="field"><label>Arquivo .xlsx</label><input type="file" id="xlsxFile" accept=".xlsx,.xls" onchange="onXlsxSelect()" style="padding:7px"></div>
    <div id="xlsxInfo" style="font-size:12px;color:var(--whi2);min-height:16px;margin-bottom:6px"></div>
    <div class="imp-bar-wrap"><div class="imp-bar" id="impBarXlsx"></div></div>
    <div class="imp-log" id="impLogXlsx">Selecione um arquivo...</div>
    <div class="brow" id="impBtnsXlsx"><button class="btn bp" id="btnImportXlsx" onclick="startImportXlsx()" disabled style="opacity:.4">▶ Importar</button><button class="btn bo" onclick="closeM('mImportXlsx')">Cancelar</button></div>
  </div>
</div>
<!-- MODAL EXPORT -->
<div class="mbg" id="mExport">
  <div class="modal">
    <div class="modal-title">📤 Exportar para Excel</div>
    <div class="brow" style="flex-direction:column;gap:8px">
      <button class="btn bw" style="justify-content:flex-start" onclick="exportXlsx('oradores')">👤 Oradores</button>
      <button class="btn bw" style="justify-content:flex-start" onclick="exportXlsx('programa')">📅 Programação</button>
      <button class="btn bw" style="justify-content:flex-start" onclick="exportXlsx('historico')">📖 Histórico de discursos</button>
    </div>
    <div class="brow"><button class="btn bo" onclick="closeM('mExport')">Fechar</button></div>
  </div>
</div>
<!-- APP -->
<header>
  <div class="logo">◈ Bom Jesus <span>Oradores</span></div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn bo bs" onclick="openM('mExport')" title="Exportar Excel">📤</button>
    <div class="ai-btn" onclick="toggleAI()">◈ IA</div>
  </div>
</header>
<nav>
  <div class="tab active" data-p="home">🏠 Home</div>
  <div class="tab" data-p="programa">📅 Programação</div>

<script>
// STATE
let db=null,FF=null,oradores=[],discursos=[],sugestoes=[],sentinelas=[],programa=[];
let notaAtual=0,temaFiltro='todos';
let cfg={cong:'Congregação Bom Jesus',end:'R. Amazonas, nº 121 — Bom Jesus 1, Matozinhos, MG',hor:'19:00'};
let TL={...TEMAS}; // temasLocal — updatable copy

// SETUP
function checkSetup(){
  const fb=localStorage.getItem('bj_fb');
  const lc=localStorage.getItem('bj_cfg');
  const lt=localStorage.getItem('bj_temas');
  if(lc) cfg=JSON.parse(lc);
  if(lt) Object.assign(TL,JSON.parse(lt));
  programa=IMPORT_PROGRAMA.filter(p=>p.data&&/^\d{4}-\d{2}-\d{2}/.test(p.data));
  renderHome(); renderTemas();
  if(fb){document.getElementById('setup').style.display='none';initFB(JSON.parse(fb));}
}

async function doSetup(){
  const key=document.getElementById('sApiKey').value.trim();
  const pid=document.getElementById('sProjId').value.trim();
  const err=document.getElementById('setupErr');
  if(!key||!pid){err.textContent='Preencha pelo menos API Key e Project ID.';err.style.display='block';return;}
  err.style.display='none';
  const auth=document.getElementById('sAuth').value.trim();
  const appid=document.getElementById('sAppId').value.trim();
  const gem=document.getElementById('sGemini').value.trim();
  const fbcfg={apiKey:key,authDomain:auth||pid+'.firebaseapp.com',projectId:pid,appId:appid};
  localStorage.setItem('bj_fb',JSON.stringify(fbcfg));
  if(gem)localStorage.setItem('bj_gem',gem);
  document.getElementById('setup').style.display='none';
  initFB(fbcfg);
}

async function initFB(fbCfg){
  try{
    const{initializeApp,getApps}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
    const F=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const app=getApps().length?getApps()[0]:initializeApp(fbCfg);
    db=F.getFirestore(app);
    FF={col:F.collection,doc:F.doc,set:F.setDoc,get:F.getDoc,gets:F.getDocs,upd:F.updateDoc,del:F.deleteDoc,add:F.addDoc,ts:F.serverTimestamp};
    await loadAll();
    toast('◈ Firebase conectado!');
  }catch(e){toast('Erro: '+e.message);console.error(e);}
}

async function loadAll(){
  await Promise.all([loadOradores(),loadDiscursos(),loadSugestoes(),loadSentinelas(),loadPrograma()]);
  renderHome();renderTemas();renderAnalytics();
}

// NAV
function irTab(p){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  const t=document.querySelector('[data-p="'+p+'"]');if(t)t.classList.add('active');
  const pg=document.getElementById('page-'+p);if(pg)pg.classList.add('active');
  if(p==='analytics')renderAnalytics();
  if(p==='oradores')renderOradores();
  if(p==='sugestoes')renderSugestoes();
  if(p==='temas')renderTemas();
  if(p==='programa')renderPrograma();
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>irTab(t.dataset.p)));

// UTILS
function fD(iso){if(!iso)return'—';const[y,m,d]=iso.slice(0,10).split('-');return d+'/'+m+'/'+y;}
function fDL(iso){
  if(!iso)return'—';
  const dt=new Date(iso+'T12:00:00');
  const dias=['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
  const mes=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return dias[dt.getDay()]+', '+dt.getDate()+' de '+mes[dt.getMonth()]+' de '+dt.getFullYear()+' — '+cfg.hor;
}
function fDSem(iso){
  if(!iso)return'—';
  const dt=new Date(iso+'T12:00:00');
  const dias=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const mes=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return dias[dt.getDay()]+', '+dt.getDate()+' de '+mes[dt.getMonth()]+' de '+dt.getFullYear();
}
function diaSem(iso){if(!iso)return'';try{const dt=new Date(iso+'T12:00:00');return['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][dt.getDay()];}catch(e){return'';}}
function mesesAno(iso){
  if(!iso)return null;
  const hoje=new Date();const ult=new Date(iso+'T12:00:00');const ms=hoje-ult;if(ms<0)return null;
  const m=Math.floor(ms/(864e5*30.44));
  if(m<1)return'Este mês';if(m===1)return'1 mês';
  if(m<12)return m+' meses';
  const a=Math.floor(m/12);const r=m%12;
  return a+(a>1?' anos':' ano')+(r>0?' e '+r+(r>1?' meses':' mês'):'');
}
function corTempo(iso){
  if(!iso)return'bred';
  const m=Math.floor((new Date()-new Date(iso+'T12:00:00'))/(864e5*30.44));
  return m<6?'bgrn':m<12?'bamb':'bred';
}
function ehSist(nome){if(!nome)return true;const s=['CONGRESSO','ASSEMBLEIA','CELEBRAÇÃO','VISITA','REUNIÃO','DISCURSO ESPECIAL','TRANSIÇÃO','STREAM'];return s.some(x=>nome.toUpperCase().includes(x));}
function nextSab(){
  const d=new Date();d.setHours(12,0,0,0);
  const dow=d.getDay();const diff=dow===6?0:(6-dow);
  d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10);
}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.mbg').forEach(b=>b.addEventListener('click',e=>{if(e.target===b)b.classList.remove('open');}));
function toast(msg,dur=2800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),dur);}

// HOME
function renderHome(){
  const hoje=new Date().toISOString().slice(0,10);
  const sorted=[...programa].filter(p=>p.data).sort((a,b)=>a.data>b.data?1:-1);
  const proxSab=nextSab();
  let sem=sorted.find(p=>p.data===proxSab)||sorted.find(p=>p.data>=hoje);
  const div=document.getElementById('homeWeekCard');
  if(!sem){
    div.innerHTML='<div class="week-card"><div class="week-date">Esta semana</div><div class="week-tema" style="color:var(--whi3)">Sem discurso programado</div><button class="btn bp bs" onclick="openNovoAgend()" style="margin-top:8px">+ Inserir</button></div>';
  } else {
    const nT=sem.temaNum;
    const nomeT=nT&&TL[nT]?TL[nT]:sem.tema||'';
    const temOr=sem.nome&&!ehSist(sem.nome);
    const enc=encodeURIComponent(JSON.stringify(sem));
    let h='<div class="week-card">';
    h+='<div class="week-date">📅 '+fDSem(sem.data)+'</div>';
    if(nT) h+='<div style="margin-bottom:6px"><span class="badge bpur">Tema nº '+nT+'</span></div>';
    h+='<div class="week-tema">'+(nomeT||'<span style="color:var(--whi3);font-style:italic">Tema não definido</span>')+'</div>';
    if(sem.obs) h+='<div style="font-size:12px;color:var(--pur3);margin-bottom:10px">⚡ '+sem.obs+'</div>';
    if(temOr){
      h+='<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 14px;background:rgba(0,0,0,.22);border-radius:8px">';
      h+='<div style="flex:1;min-width:100px"><div style="font-weight:600;font-size:14px">'+sem.nome+'</div>';
      h+='<div style="font-size:11px;color:var(--whi3);margin-top:2px">'+(sem.congregacao||'—')+'</div>';
      if(sem.telefone) h+='<div style="font-size:11px;color:var(--whi3)">'+sem.telefone+'</div>';
      h+='</div><div style="display:flex;gap:6px;flex-wrap:wrap">';
      if(sem.telefone){
        h+='<button class="btn bgn bs" onclick="abrirWADir(\''+sem.telefone+'\')">💬 WhatsApp</button>';
        h+='<button class="btn bo bs" onclick="abrirMsgPadrao(\''+enc+'\')">✦ Mensagem</button>';
      } else {
        h+='<span style="font-size:12px;color:var(--whi3)">Sem contato</span>';
      }
      h+='</div></div>';
    } else {
      h+='<div style="padding:10px 13px;background:rgba(0,0,0,.18);border-radius:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">';
      h+='<span style="font-size:12px;color:var(--whi3)">Orador não definido</span>';
      h+='<button class="btn bp bs" onclick="editarAgend(\''+enc+'\')">+ Definir orador</button></div>';
    }
    h+='<button style="position:absolute;top:10px;right:10px;background:none;border:none;cursor:pointer;color:var(--whi3);font-size:11px;padding:4px 7px;border-radius:5px" onclick="editarAgend(\''+enc+'\')">✏️ editar</button>';
    h+='</div>';
    div.innerHTML=h;
  }
  // Sentinela chip
  const sd=document.getElementById('homeSentinela');
  const us=sentinelas.length?sentinelas[0]:null;
  if(us){
    sd.innerHTML='<div class="sentchip">📖 <strong>Sentinela:</strong> '+us.tema+(us.data?' <span style="opacity:.6;margin-left:6px">'+fD(us.data)+'</span>':'')+'</div>';
  } else {
    sd.innerHTML='<div class="sentchip" style="opacity:.4;cursor:pointer" onclick="irTab(\'sentinela\')">📖 Nenhum tema da Sentinela registrado</div>';
  }
}

// PROGRAMAÇÃO
async function loadPrograma(){
  if(!db){renderPrograma();return;}
  const s=await FF.gets(FF.col(db,'programa'));
  if(s.docs.length>0) programa=s.docs.map(d=>({id:d.id,...d.data()}));
  else programa=IMPORT_PROGRAMA.filter(p=>p.data&&/^\d{4}-\d{2}-\d{2}/.test(p.data));
  renderPrograma();renderHome();
}

function renderPrograma(){
  const hoje=new Date().toISOString().slice(0,10);
  const sorted=[...programa].filter(p=>p.data).sort((a,b)=>a.data>b.data?1:-1);
  const prox=sorted.filter(p=>p.data>=hoje);
  const div=document.getElementById('listaPrograma');
  if(!div)return;
  if(!prox.length){div.innerHTML='<div class="empty"><div class="ico">📅</div>Sem datas futuras</div>';return;}
  div.innerHTML=prox.map(p=>{
    const temOr=p.nome&&!ehSist(p.nome);
    const nT=p.temaNum;
    const nomeT=nT&&TL[nT]?TL[nT]:p.tema||'';
    const semT=!nomeT||nomeT.toLowerCase().includes('falta');
    const bc=temOr?'var(--border)':semT?'rgba(239,68,68,.2)':'rgba(124,58,237,.2)';
    const enc=encodeURIComponent(JSON.stringify(p));
    let h='<div class="prog-row" style="border-color:'+bc+'">';
    h+='<div style="min-width:70px;flex-shrink:0"><div style="font-size:12px;font-weight:700;color:var(--whi2)">'+fD(p.data)+'</div><div style="font-size:10px;color:var(--whi3)">'+diaSem(p.data)+'</div></div>';
    h+='<div style="flex:1;min-width:0">';
    if(nT) h+='<span class="badge bpur" style="margin-bottom:3px;display:inline-block">Nº '+nT+'</span> ';
    h+='<div style="font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:'+(semT?'var(--whi3)':'var(--whi)')+'">'+( semT?'<em>Tema não definido</em>':nomeT)+'</div>';
    h+='<div style="font-size:11px;color:'+(temOr?'var(--whi2)':'rgba(239,68,68,.8)')+';margin-top:2px">'+(temOr?p.nome+' · '+(p.congregacao||'—'):'Sem orador')+'</div>';
    h+='</div><div style="display:flex;gap:4px;flex-shrink:0">';
    if(temOr&&p.telefone) h+='<button class="btn bo bs" onclick="abrirWADir(\''+p.telefone+'\')" title="WhatsApp">💬</button>';
    h+='<button class="btn bo bs" onclick="editarAgend(\''+enc+'\')" title="Editar">✏️</button>';
    if(p.id) h+='<button class="btn bo bs" style="color:var(--red);opacity:.7" onclick="delAgend(\''+p.id+'\')">✕</button>';
    h+='</div></div>';
    return h;
  }).join('');
}

function openNovoAgend(){
  preencherModalAgend({});
  document.getElementById('agData').value=nextSab();
  document.getElementById('mAgendTit').textContent='Inserir na Programação';
  openM('mAgend');
}

function editarAgend(enc){
  const p=JSON.parse(decodeURIComponent(enc));
  preencherModalAgend(p);
  document.getElementById('mAgendTit').textContent='Editar — '+fD(p.data);
  openM('mAgend');
}

function preencherModalAgend(p){
  document.getElementById('agId').value=p.id||'';
  document.getElementById('agData').value=p.data||'';
  document.getElementById('agTema').value=p.temaNum||'';
  document.getElementById('agObs').value=p.obs||'';
  document.getElementById('agCadastrar').checked=false;
  onAgTema();
  // Populate select
  const sel=document.getElementById('agOradorSel');
  sel.innerHTML='<option value="">— Selecionar —</option><option value="__digitar__">✏️ Digitar manualmente</option>';
  [...oradores].sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).forEach(o=>{
    const opt=document.createElement('option');
    opt.value=o.id;opt.textContent=o.nome+' ('+(o.cong||'?')+')';
    if(p.nome&&p.nome===o.nome)opt.selected=true;
    sel.appendChild(opt);
  });
  const matched=p.nome&&oradores.find(o=>o.nome===p.nome);
  if(p.nome&&!matched){
    sel.value='__digitar__';
    document.getElementById('agManual').style.display='block';
    document.getElementById('agNome').value=p.nome||'';
    document.getElementById('agCong').value=p.congregacao||'';
    document.getElementById('agTel').value=p.telefone||'';
  } else {
    document.getElementById('agManual').style.display='none';
    if(matched){
      document.getElementById('agNome').value=matched.nome||'';
      document.getElementById('agCong').value=matched.cong||'';
      document.getElementById('agTel').value=matched.tel||'';
    }
  }
}

function onAgTema(){const n=parseInt(document.getElementById('agTema').value);document.getElementById('agTemaDesc').textContent=n&&TL[n]?TL[n]:'';}

function onAgOradorSel(){
  const v=document.getElementById('agOradorSel').value;
  const m=document.getElementById('agManual');
  if(v==='__digitar__'){
    m.style.display='block';
    ['agNome','agCong','agTel'].forEach(id=>document.getElementById(id).value='');
  } else if(v){
    m.style.display='none';
    const o=oradores.find(x=>x.id===v);
    if(o){document.getElementById('agNome').value=o.nome;document.getElementById('agCong').value=o.cong||'';document.getElementById('agTel').value=o.tel||'';}
  } else {
    m.style.display='none';
  }
}

async function saveAgend(){
  if(!db)return toast('Firebase não conectado!');
  const id=document.getElementById('agId').value;
  const data_val=document.getElementById('agData').value;
  if(!data_val)return toast('Informe a data!');
  const selV=document.getElementById('agOradorSel').value;
  let nome='',cong='',tel='';
  if(selV&&selV!=='__digitar__'){
    const o=oradores.find(x=>x.id===selV);
    if(o){nome=o.nome;cong=o.cong||'';tel=o.tel||'';}
  } else {
    nome=document.getElementById('agNome').value.trim();
    cong=document.getElementById('agCong').value.trim();
    tel=document.getElementById('agTel').value.trim();
    if(nome&&document.getElementById('agCadastrar').checked){
      await FF.add(FF.col(db,'oradores'),{nome,cong,tel,ultimoDiscurso:data_val,nota:0,obs:''});
      await loadOradores();
      toast('Orador cadastrado!');
    }
  }
  const entry={data:data_val,temaNum:parseInt(document.getElementById('agTema').value)||null,nome:nome||null,congregacao:cong,telefone:tel,obs:document.getElementById('agObs').value.trim()};
  if(id){
    await FF.upd(FF.doc(db,'programa',id),entry);
    programa=programa.filter(p=>p.id!==id);
    entry.id=id;
  } else {
    const ref=await FF.add(FF.col(db,'programa'),entry);
    entry.id=ref.id;
  }
  programa.push(entry);
  closeM('mAgend');renderPrograma();renderHome();toast('✓ Salvo!');
}

async function delAgend(id){
  if(!confirm('Remover este agendamento?'))return;
  if(db)await FF.del(FF.doc(db,'programa',id));
  programa=programa.filter(p=>p.id!==id);
  renderPrograma();renderHome();
}

// WA
function abrirWADir(tel){window.open('https://wa.me/55'+tel.replace(/\D/g,''),'_blank');}
function abrirMsgPadrao(enc){
  const p=JSON.parse(decodeURIComponent(enc));
  const nT=p.temaNum;const nomeT=nT&&TL[nT]?TL[nT]:p.tema||'—';
  const msg='Orador: '+(p.nome||'—')+'\nCongregação: '+(p.congregacao||'—')+'\nTema: '+nomeT+'\nData: '+fDL(p.data)+'\nLocal: '+cfg.cong+'\nEndereço: '+cfg.end;
  const tel=p.telefone?p.telefone.replace(/\D/g,''):'';
  window.open(tel?'https://wa.me/55'+tel+'?text='+encodeURIComponent(msg):'https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

// TEMAS

// ANALYTICS
function renderAnalytics(){
  const hoje=new Date().toISOString().slice(0,10);
  const ano=new Date().getFullYear();
  const validos=Object.keys(TL).filter(n=>TL[n]!=='(Não use.)');
  const nunca=validos.filter(n=>!discursos.find(d=>d.temaNum==n)).length;
  document.getElementById('statGrid').innerHTML=
    '<div class="stat-box"><div class="stat-val">'+oradores.length+'</div><div class="stat-lbl">Oradores</div></div>'
    +'<div class="stat-box"><div class="stat-val">'+discursos.length+'</div><div class="stat-lbl">Discursos</div></div>'
    +'<div class="stat-box"><div class="stat-val">'+discursos.filter(d=>d.data?.startsWith(ano)).length+'</div><div class="stat-lbl">Em '+ano+'</div></div>'
    +'<div class="stat-box"><div class="stat-val">'+nunca+'</div><div class="stat-lbl">Temas nunca usados</div></div>'
    +'<div class="stat-box"><div class="stat-val">'+sugestoes.length+'</div><div class="stat-lbl">Sugestões</div></div>';
  const ct={};
  discursos.forEach(d=>{if(d.temaNum&&d.temaNum>0)ct[d.temaNum]=(ct[d.temaNum]||0)+1;});
  const topT=Object.entries(ct).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const mx=topT[0]?.[1]||1;
  document.getElementById('rankTemas').innerHTML=topT.map(([n,c])=>
    '<div class="rank-row"><div style="flex:1;min-width:0"><div>Nº'+n+' — '+(TL[n]||'?').slice(0,35)+((TL[n]||'').length>35?'…':'')+'</div><div class="rank-bar" style="width:'+Math.round(c/mx*100)+'%"></div></div><strong>'+c+'×</strong></div>'
  ).join('');
  const mapU={};
  discursos.forEach(d=>{if(d.oradorId&&(!mapU[d.oradorId]||d.data>mapU[d.oradorId]))mapU[d.oradorId]=d.data;});
  const rank=oradores.map(o=>{const u=mapU[o.id]||o.ultimoDiscurso;const m=u?Math.floor((new Date()-new Date(u+'T12:00:00'))/(864e5*30.44)):999;return{o,m};}).sort((a,b)=>b.m-a.m).slice(0,8);
  document.getElementById('rankSem').innerHTML=rank.map(({o,m})=>
    '<div class="rank-row"><div><div style="font-size:12px">'+o.nome+'</div><div style="font-size:10px;color:var(--whi3)">'+(o.cong||'—')+'</div></div><span class="badge '+corTempo(o.ultimoDiscurso)+'">'+(m>900?'Nunca':(mesesAno(o.ultimoDiscurso)||'—'))+'</span></div>'
  ).join('');
  const cc={};oradores.forEach(o=>{if(o.cong&&o.cong.trim())cc[o.cong]=(cc[o.cong]||0)+1;});
  const topC=Object.entries(cc).sort((a,b)=>b[1]-a[1]).slice(0,20);
  document.getElementById('rankCongs').innerHTML='<div style="display:flex;flex-wrap:wrap;margin-top:4px">'
    +topC.map(([c,n])=>'<div class="cong-chip" onclick="verCong(\''+encodeURIComponent(c)+'\')">'+c+' <strong>'+n+'</strong></div>').join('')+'</div>';
}
function verCong(enc){
  const cong=decodeURIComponent(enc);
  const ors=oradores.filter(o=>o.cong===cong);
  document.getElementById('mCongTit').textContent=cong+' ('+ors.length+')';
  document.getElementById('mCongLista').innerHTML=ors.length?ors.map(o=>{
    const t=mesesAno(o.ultimoDiscurso);

      +(t?'<span class="badge '+corTempo(o.ultimoDiscurso)+'">'+t+'</span>':'')+'</div>';
  }).join(''):'<div style="color:var(--whi3);font-size:13px;padding:8px 0">Nenhum orador.</div>';

// IMPORT XLSX
let xlsxParsed=null;
async function onXlsxSelect(){
  const file=document.getElementById('xlsxFile').files[0];if(!file)return;
  const info=document.getElementById('xlsxInfo'),btn=document.getElementById('btnImportXlsx');
  info.textContent='Lendo...';
  if(!window.XLSX){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    if(!wb.SheetNames.includes('Discursos')){info.textContent='Aba "Discursos" não encontrada!';return;}
    const rows=XLSX.utils.sheet_to_json(wb.Sheets['Discursos'],{header:1,raw:false,dateNF:'yyyy-mm-dd'});
    xlsxParsed=[];
    for(const row of rows){const d=String(row[0]||'').slice(0,10);if(!d.match(/^\d{4}-\d{2}-\d{2}/))continue;xlsxParsed.push({data:d,nome:String(row[2]||'').trim()||null,telefone:String(row[4]||'').trim(),congregacao:String(row[5]||'').trim(),temaNum:row[6]?parseInt(row[6])||null:null,tema:String(row[8]||'').trim()});}
    xlsxParsed=xlsxParsed.filter(p=>p.data>='2022-01-01');
    info.textContent='✓ '+xlsxParsed.length+' registros ('+xlsxParsed.filter(p=>p.nome).length+' com orador)';
    btn.disabled=false;btn.style.opacity='1';
  }catch(e){info.textContent='Erro: '+e.message;}
}
async function startImportXlsx(){
  if(!db||!xlsxParsed)return;
  const bar=document.getElementById('impBarXlsx'),log=document.getElementById('impLogXlsx'),btns=document.getElementById('impBtnsXlsx');
  btns.innerHTML='<div class="spin" style="margin:4px 0"></div>';log.innerHTML='';
  const aL=m=>{log.innerHTML+=m+'\n';log.scrollTop=log.scrollHeight;};
  try{
    const hoje=new Date().toISOString().slice(0,10);
    const comOr=xlsxParsed.filter(p=>p.nome&&!ehSist(p.nome));
    const fut=xlsxParsed.filter(p=>p.data>=hoje);
    aL('► '+comOr.length+' discursos...');
    for(let i=0;i<comOr.length;i++){await FF.add(FF.col(db,'discursos'),comOr[i]);bar.style.width=Math.round((i+1)/comOr.length*60)+'%';}
    aL('✓ Discursos');aL('► '+fut.length+' datas futuras...');
    for(let i=0;i<fut.length;i++){await FF.add(FF.col(db,'programa'),fut[i]);bar.style.width=60+Math.round((i+1)/fut.length*40)+'%';}
    bar.style.width='100%';aL('✓ Programação\n◈ Concluído!');
    await loadAll();btns.innerHTML='<button class="btn bo" onclick="closeM(\'mImportXlsx\')">Fechar</button>';toast('◈ Planilha importada!');
  }catch(e){aL('✗ ERRO: '+e.message);btns.innerHTML='<button class="btn bo" onclick="closeM(\'mImportXlsx\')">Fechar</button>';}
}

async function exportXlsx(tipo){
  if(!window.XLSX){await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
  let rows=[],fn='';
  if(tipo==='oradores'){fn='oradores_bom_jesus.xlsx';rows=[['Nome','Congregação','Telefone','Último Discurso','Nota','Observação']];oradores.sort((a,b)=>(a.nome||'').localeCompare(b.nome||'')).forEach(o=>rows.push([o.nome,o.cong||'',o.tel||'',o.ultimoDiscurso||'',o.nota||0,o.obs||'']));}
  else if(tipo==='programa'){fn='programacao_bom_jesus.xlsx';rows=[['Data','Dia','Nº Tema','Tema','Orador','Congregação','Telefone','Obs']];[...programa].sort((a,b)=>a.data>b.data?1:-1).forEach(p=>{const nT=p.temaNum&&TL[p.temaNum]?TL[p.temaNum]:p.tema||'';rows.push([p.data,diaSem(p.data),p.temaNum||'',nT,p.nome||'',p.congregacao||'',p.telefone||'',p.obs||'']);});}
  else{fn='historico_discursos.xlsx';rows=[['Data','Orador','Congregação','Telefone','Nº Tema','Tema']];[...discursos].sort((a,b)=>a.data>b.data?1:-1).forEach(d=>rows.push([d.data,d.nome||'',d.congregacao||'',d.telefone||'',d.temaNum||'',d.tema||'']));}
  const ws=XLSX.utils.aoa_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Dados');XLSX.writeFile(wb,fn);
  toast('◈ Exportado!');closeM('mExport');
}

// GEMINI AI
async function gemini(prompt,key,retry=0){
  const url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+key;
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
  if(r.status===429){if(retry<2){await new Promise(res=>setTimeout(res,3000*(retry+1)));return gemini(prompt,key,retry+1);}throw new Error('Limite atingido (429). Aguarde e tente novamente.');}
  if(!r.ok)throw new Error('HTTP '+r.status);
  const data=await r.json();return data.candidates?.[0]?.content?.parts?.[0]?.text||'Sem resposta.';
}
function buildCtx(){
  const ct={};discursos.forEach(d=>{if(d.temaNum&&d.temaNum>0)ct[d.temaNum]=(ct[d.temaNum]||0)+1;});
  const topT=Object.entries(ct).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([n,c])=>'T'+n+'('+( TL[n]||'?')+'):'+c+'x').join(', ');
  const mapU={};discursos.forEach(d=>{if(d.oradorId&&(!mapU[d.oradorId]||d.data>mapU[d.oradorId]))mapU[d.oradorId]=d.data;});
  const sem=oradores.map(o=>{const u=mapU[o.id]||o.ultimoDiscurso;const m=u?Math.floor((new Date()-new Date(u+'T12:00:00'))/(864e5*30.44)):999;return o.nome+'('+( o.cong||'—')+'):'+( m>900?'nunca':m+'m');}).sort().slice(0,10).join(', ');
  return 'CONGREGAÇÃO BOM JESUS (Matozinhos/MG)\nOradores:'+oradores.length+' | Discursos:'+discursos.length+'\nTop temas: '+topT+'\nSem discursar: '+sem;
}
function toggleAI(){document.getElementById('aiPanel').classList.toggle('open');}
function closeAI(){document.getElementById('aiPanel').classList.remove('open');}
async function sendAI(){const inp=document.getElementById('aiIn');const msg=inp.value.trim();if(!msg)return;inp.value='';await askAI(msg);}
async function askAI(msg){
  const gk=localStorage.getItem('bj_gem');
  document.getElementById('aiPanel').classList.add('open');
  addAIMsg('u',msg);
  if(!gk){addAIMsg('b','⚠️ Configure a chave Gemini em ⚙️ Config.');return;}
  const bot=addAIMsg('b','⏳ Pensando...');
  try{const r=await gemini(buildCtx()+'\n\nVocê é assistente da Congregação Bom Jesus. Responda em português.\n\nPergunta: '+msg,gk);bot.textContent=r;}
  catch(e){bot.textContent='✗ '+e.message;}
}
function addAIMsg(tipo,txt){const d=document.createElement('div');d.className='ai-msg '+tipo;d.textContent=txt;const c=document.getElementById('aiMsgs');c.appendChild(d);d.scrollIntoView({behavior:'smooth',block:'nearest'});return d;}

checkSetup();
